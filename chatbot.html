<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatAI Văn Hóa Chăm – Cham Folktales AI</title>
<link rel="stylesheet" href="style.css">
<style>
.cb-page {
    padding: 20px 0 40px;
}

.cb-header {
    text-align: center;
    padding: 20px 16px 24px;
}

.cb-header h1 {
    font-size: 40px;
    color: #f4c86b;
    font-weight: 800;
    margin-bottom: 10px;
}

.cb-header p {
    color: #cbd5e1;
    font-size: 16px;
    max-width: 560px;
    margin: 0 auto;
    line-height: 1.6;
}

.cb-frame-wrap {
    width: 100%;
    height: calc(100vh - 200px);
    min-height: 500px;
    max-height: 900px;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(244,200,107,0.2);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    background: #111827;
}

.cb-frame-wrap iframe {
    /* Chatbase thêm sidebar ~260px bên trái,
       kéo rộng hơn viewport rồi dịch trái để cắt sidebar đó đi */
    width: calc(100% + 260px);
    height: 100%;
    margin-left: -260px;
    border: none;
    display: block;
}

@media (max-width: 768px) {
    .cb-header h1 { font-size: 26px; }
    .cb-header p  { font-size: 14px; }
    .cb-frame-wrap {
        height: calc(100vh - 160px);
        min-height: 460px;
        border-radius: 12px;
    }
    /* sidebar Chatbase hẹp hơn trên mobile ~220px */
    .cb-frame-wrap iframe {
        width: calc(100% + 220px);
        margin-left: -220px;
    }
}
</style>
</head>
<body>

<div class="container">
<div class="cb-page">

    <a href="index.html" class="back-btn">← Trang chủ</a>

    <div class="cb-header">
        <h1>🤖 ChatAI Văn Hóa Chăm</h1>
        <p>Khám phá lịch sử, phong tục, tín ngưỡng, nghệ thuật và những câu chuyện dân gian của người Chăm thông qua AI.</p>
    </div>

    <div class="cb-frame-wrap">
        <iframe
            src="https://www.chatbase.co/c4M_3t0u1Y0ALdoCKAteB/help"
            title="ChatAI Văn Hóa Chăm"
            allow="microphone">
        </iframe>
    </div>

</div>
</div>

</body>
</html>
